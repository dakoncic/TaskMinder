<div class="home-page flex flex-column">
  <div class="card dashboard-shell">
    <section class="dashboard-intro">
      <div>
        <h1 class="section-title">Planer tjedna</h1>
      </div>
    </section>

    <section class="week-board-section">
      <div class="grid dashboard-grid">
      @for (dayData of weekData$ | async; track dayData) {
      <div class="col-12 md:col-6 xl:col-3 day-column">
        <app-todo
          [items$]="dayData.items$"
          [weekDayDate]="dayData.weekDayDate"
          [cols]="cols"
        >
        </app-todo>
      </div>
      }
      </div>
    </section>

    <p-toolbar styleClass="dashboard-toolbar mb-4">
      <div class="toolbar-primary my-2">
        <button
          pButton
          [label]="'home.newTask' | translate"
          icon="pi pi-plus"
          class="p-button-info app-toolbar-button mr-2"
          (click)="openNew()"
        ></button>
      </div>
      <p-selectButton
        [options]="weekdays"
        [(ngModel)]="currentDay"
        optionLabel="name"
        optionValue="value"
        styleClass="dashboard-day-selector"
      >
      </p-selectButton>
    </p-toolbar>

    <section class="task-lists-section">
      <div class="grid dashboard-grid">
      <div class="col-12 xl:col-6">
        <app-active-task-occurrences-table
          [items]="(oneTimeItems$ | async)!"
          [columns]="cols"
          [(currentDay)]="currentDay"
          title="home.oneTime"
          [isRecurring]="false"
        ></app-active-task-occurrences-table>
      </div>
      <div class="col-12 xl:col-6">
        <app-active-task-occurrences-table
          [items]="(recurringItems$ | async)!"
          [columns]="cols"
          [(currentDay)]="currentDay"
          title="home.recurring"
          [isRecurring]="true"
        ></app-active-task-occurrences-table>
      </div>
      </div>
    </section>

    <p-divider styleClass="dashboard-divider" />

    <section class="notepads-section">
      <div class="flex justify-content-between align-items-center flex-wrap gap-3 mb-3">
        <div>
          <h2 class="section-title section-title--compact">Bilješke</h2>
        </div>

        <button
          pButton
          [label]="'home.newNotepad' | translate"
          icon="pi pi-plus"
          class="p-button-info app-toolbar-button"
          (click)="createNewNotepad()"
        ></button>
      </div>

    <div class="grid dashboard-grid">
      @for (notepad of notepads$ | async; track notepad) {
      <div class="col-12 xl:col-6">
        <app-notepad [notepad]="notepad"></app-notepad>
      </div>
      }
    </div>
    </section>
  </div>
</div>
