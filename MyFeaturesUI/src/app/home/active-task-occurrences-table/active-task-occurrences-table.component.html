<div pDroppable="true" (drop)="onDrop($event, isRecurring)" class="app-panel">
  <p-table
    [value]="items"
    [columns]="columns"
    [rowHover]="true"
    dataKey="id"
    (onRowReorder)="onRowReorder($event)"
  >
    <ng-template pTemplate="caption">
      <div
        class="app-panel__caption flex flex-column md:flex-row md:justify-content-between md:align-items-center"
      >
        <h5 class="m-0 app-panel__title">{{ title | translate }}</h5>
      </div>
    </ng-template>
    <ng-template
      pTemplate="body"
      let-rowData
      let-columns="columns"
      let-index="rowIndex"
    >
      <tr
        [ngClass]="{
          'cursor-pointer': currentDay,
          'committed-background-color':
            rowData.committedDate !== null && rowData.dueDate === null,
          'disable-row-reorder': rowData.dueDate !== null
        }"
        [pReorderableRow]="index"
        (dragstart)="onDragStart($event, rowData, index)"
        (click)="assignTaskOccurrenceToSelectedWeekday(rowData)"
      >
        <td class="w-2rem">
          @if (!rowData.dueDate) {
          <span class="pi pi-bars app-panel__drag-handle" pReorderableRowHandle></span>
          }
        </td>
        @for (col of columns; track col) {
        <td [ngStyle]="{ 'text-align': col.align }">
          <span class="app-panel__row-text">{{ rowData[col.field] }}</span>
        </td>
        }
        <td class="app-panel__actions-cell">
          <div class="task-row-actions flex justify-content-end align-items-center gap-2">
            @if (!isRecurring) {
            <button
              pButton
              icon="pi pi-check"
              class="p-button-rounded p-button-success task-action-btn"
              (click)="completeTaskOccurrence(rowData)"
            ></button>
            }
            <button
              pButton
              icon="pi pi-pencil"
              class="p-button-rounded p-button-info task-action-btn"
              (click)="editTaskOccurrence(rowData)"
            ></button>
            <button
              pButton
              icon="pi pi-trash"
              class="p-button-rounded p-button-danger task-action-btn"
              (click)="deleteTaskTemplate(rowData)"
            ></button>
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
